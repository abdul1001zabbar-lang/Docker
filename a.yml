


apiVersion: batch/v1
kind: Job

metadata:
  name: job-demo

spec:
  template:
    spec:
      containers:
      - name: job
        image: busybox
        command: ["echo","Hello Job"]

      restartPolicy: Never
---
apiVersion: batch/v1
kind: CronJob

metadata:
  name: cron-demo

spec:
  schedule: "*/5 * * * *"

  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: cron
            image: busybox
            command: ["echo","Hello CronJob"]

          restartPolicy: Never