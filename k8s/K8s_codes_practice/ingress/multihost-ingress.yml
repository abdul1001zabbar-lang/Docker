apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: multi-host-ingress

spec:
  ingressClassName: nginx

  rules:

  - host: nginx.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-service
            port:
              number: 80

  - host: flask.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: flask-service
            port:
              number: 5000


# http://nginx.local
# http://flask.local

