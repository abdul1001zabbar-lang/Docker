apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment

spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask

  template:
    metadata:
      labels:
        app: flask

    spec:
      containers:
      - name: flask
        image: hashicorp/http-echo
        args:
        - "-text=Hello from Flask App"
        ports:
        - containerPort: 5678
``