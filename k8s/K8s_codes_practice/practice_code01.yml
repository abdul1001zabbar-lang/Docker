# =========================
# NAMESPACE
# =========================
apiVersion: v1
kind: Namespace
metadata:
  name: dev

---
# =========================
# CONFIGMAP
# =========================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: dev
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <body>
      <h1>Hello DevOps 🚀</h1>
    </body>
    </html>

---
# =========================
# SECRET
# =========================
apiVersion: v1
kind: Secret
metadata:
  name: nginx-secret
  namespace: dev
type: Opaque
data:
  username: YWRtaW4=
  password: YWRtaW4xMjM=

---
# =========================
# PVC
# =========================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-pvc
  namespace: dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# =========================
# DEPLOYMENT (FULL)
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: dev
spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      nodeSelector:
        disktype: ssd

      tolerations:
      - key: "key1"
        operator: "Exists"
        effect: "NoSchedule"

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: disktype
                operator: In
                values:
                - ssd

      initContainers:
      - name: init
        image: busybox
        command: ["sh", "-c", "echo init done"]

      containers:
      - name: nginx
        image: nginx:1.25

        ports:
        - containerPort: 80

        env:
        - name: USERNAME
          valueFrom:
            secretKeyRef:
              name: nginx-secret
              key: username

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 80

        volumeMounts:
        - name: config
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html

        - name: storage
          mountPath: /data

      volumes:
      - name: config
        configMap:
          name: nginx-config

      - name: storage
        persistentVolumeClaim:
          claimName: nginx-pvc

---
# =========================
# SERVICE
# =========================
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: dev
spec:
  selector:
    app: nginx
  ports:
  - port: 80

---
# =========================
# INGRESS
# =========================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress
  namespace: dev
spec:
  ingressClassName: nginx
  rules:
  - host: myapp.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-service
            port:
              number: 80

---
# =========================
# HPA
# =========================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-hpa
  namespace: dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-deployment
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50

---
# =========================
# JOB
# =========================
apiVersion: batch/v1
kind: Job
metadata:
  name: job-demo
  namespace: dev
spec:
  template:
    spec:
      containers:
      - name: job
        image: busybox
        command: ["echo", "hello job"]
      restartPolicy: Never

---
# =========================
# CRONJOB
# =========================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cron-demo
  namespace: dev
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: cron
            image: busybox
            command: ["echo", "hello cron"]
          restartPolicy: Never

---
# =========================
# DAEMONSET
# =========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemon-demo
  namespace: dev
spec:
  selector:
    matchLabels:
      app: daemon
  template:
    metadata:
      labels:
        app: daemon
    spec:
      containers:
      - name: nginx
        image: nginx

---
# =========================
# STATEFULSET
# =========================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stateful-demo
  namespace: dev
spec:
  serviceName: nginx-service
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx

---
# =========================
# RBAC
# =========================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: dev
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-pods
  namespace: dev
subjects:
- kind: User
  name: dev-user
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io