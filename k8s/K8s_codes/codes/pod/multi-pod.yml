apiVersion: v1
kind: Pod

metadata:
  name: multi-pod
  labels:
    app: multi-app

spec:
  containers:
  - name: ubuntu-container
    image: ubuntu
    command: ["sleep","3000"]
    #  command: ["bash", "-c", "while true; do echo hello; sleep 5; done"]

  - name: nginx-container
    image: nginx
    ports:
    - containerPort: 80


