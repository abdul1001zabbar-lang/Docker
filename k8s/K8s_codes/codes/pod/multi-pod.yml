apiVersion: v1
kind: Pod

metadata:
  name: three-container-pod

spec:
  containers:

  - name: nginx-container
    image: nginx
    ports:
    - containerPort: 80

  - name: ubuntu-container
    image: ubuntu
    command: ["sleep", "3000"]

  - name: busybox-container
    image: busybox
    command: ["sleep", "3000"]

