apiVersion: v1
kind: Pod

metadata:
  name: nginx-busybox-pod
  labels:
    app: nginx-busybox-app

spec:
  containers:
  - name: nginx-container
    image: nginx
    ports:
    - containerPort: 80


  - name: busybox-container
    image: busybox
    command: ["sleep", "3000"]


