apiVersion: v1
kind: Service

metdata:
  name: mongo-service

spec:
  selector:
    name: mongodb-service

  ports:
  - port: 27017
    targetPort: 27017

  type: ClusterIP
#==nodeport
apiVersion: v1
kind: Service

metdata:
  name: mongo-service

spec:
  selector:
    name: mongodb-service

  ports:
  - port: 27017
    targetPort: 27017
    nodePort: 32017   # must be between 30000–32767 

  type: NodePort

#==LB
apiVersion: v1
kind: Service

metdata:
  name: mongo-service

spec:
  selector:
    name: mongodb-service

  ports:
  - port: 27017
    targetPort: 27017
    

  type: Loadbalancer
#=============Redis Services===========
apiVersion: v1
kind: Service

metdada:
  name: redis-service

spec:
  selector:
    name: redis-service
  ports:
  - port: 6379
    tartgetPort: 6379
    nodePort: 30007   # (optional, must be 30000–32767)

  type: NodePort

#===LB
apiVersion: v1
kind: Service

metdada:
  name: redis-service

spec:
  selector:
    name: redis-service
  ports:
  - port: 6379
    tartgetPort: 6379
    

  type: LoadBalancer        

#==============MYSQL=====================
apiVersion: v1
kind: Service

metadata:
  name: mysql-service

spec:
  selector:
    app: mysql

  ports:
  - port: 3306
    targetPort: 3306
    nodePort: 30306

  type: NodePort

#===LB
apiVersion: v1
kind: Service

metadata:
  name: mysql-service

spec:
  selector:
    app: mysql

  ports:
  - port: 3306
    targetPort: 3306

  type: LoadBalancer
