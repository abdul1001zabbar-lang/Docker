---
apiVersion: v1
kind: ServiceAccount

metadata:
  name: dev-sa
  namespace: dev
---
apiVersion: v1
kind: Pod

metadata:
  name: nginx-pod
  namespace: dev

spec:
  serviceAccountName: dev-sa

  containers:
  - name: nginx
    image: nginx
---
apiVersion: v1
kind: ServiceAccount

metadata:
  name: pod-reader
  namespace: dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: read-pods
  namespace: dev

rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get","list","watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: read-pods-binding
  namespace: dev

subjects:
- kind: ServiceAccount
  name: pod-reader
  namespace: dev

roleRef:
  kind: Role
  name: read-pods
  apiGroup: rbac.authorization.k8s.io