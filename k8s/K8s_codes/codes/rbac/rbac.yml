---
apiVersion: v1
kind: Namespace
metadata:
  name: dev

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-sa
  namespace: dev

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: dev

rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs:
  - get
  - list
  - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-reader-binding
  namespace: dev

subjects:
- kind: ServiceAccount
  name: dev-sa
  namespace: dev

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-reader

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole

metadata:
  name: pod-reader

rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding

metadata:
  name: pod-reader-binding

subjects:
- kind: ServiceAccount
  name: dev-sa
  namespace: dev

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pod-reader  

#apiGroups: [""] ---pod/services/configmaps/secrets/pv/pvc/serviceaccount/nodes/endpoints/nodes/events
#apiGroups:["apps"]---replicaset/deployments/statefulset/daemonset
#apiGroups: ["batch"]---Jobs/CronJobs
#apiGroups: ["networking.k8s.io/v1"]---Ingress/networkingpolicy
#apiGroups: ["autoscaling"]---hpa
#verbs: get/list/watch/create/update/delete/modify/remove/
#verbs ["*"]--all permissions
