#Pod → PVC → PV → Storage
#in real life PVC is used
#PV show the stoarge data
#pvc asking for data like 5g i need to run app
# Retain  → Keep data
# Delete  → Remove storage
# Recycle → Deprecated

apiVersion: v1
kind: PersistentVolume

metadata:
  name: nginx-pv
  labels:
    app: nginx-app

spec:
  capacity:
    storage: 1Gi
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /mnt/data/nginx
---
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: nginx-pvc
  namespace: dev
  labels:
    app: nginx-app

spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: manual

