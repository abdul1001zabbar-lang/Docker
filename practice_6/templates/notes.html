<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Docker Notes App</h1>

<form method="POST">

<input type="text" name="note" placeholder="Enter note">

<button type="submit">Add</button>

</form>

<h2>Notes</h2>

<ul>
{% for note in notes %}
    <li>{{ note }}</li>
{% endfor %}
</ul>

</body>
</html>
